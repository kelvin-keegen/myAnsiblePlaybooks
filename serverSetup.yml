---
- name: Install necessary packages on Ubuntu LTS
  hosts: all
  become: yes
  become_user: root

  vars:
    regular_user: "{{ normal_user }}"
    devops_user: "{{ devops_user }}"
    new_password: "{{ random_pass }}"
    my_sweet_key: "{{ mykey }}"
    my_sweet_key2: "{{ mykey2 }}"
    new_ssh_port: "{{ some_ssh_int }}"
    dns_server_1: "{{ dns1 }}"
    dns_server_2: "{{ dns2 }}"

  tasks:
    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Upgrade all packages first
      apt:
        upgrade: dist
        autoclean: yes
      register: upgrade_result

    - name: Install core packages
      apt:
        name:
          - python3-pip
          - python3-requests
          - python3-passlib
          - python3-psutil
          - debian-goodies
          - openssh-server
          - cockpit
          - libpam-google-authenticator
          - speedtest-cli
          - nfs-common
          - cifs-utils
          - htop
          - net-tools
          - wireguard
          - qemu-guest-agent
          - git
          - ufw
          - lsb-release
        state: present

    - name: Add fastfetch PPA
      apt_repository:
        repo: "ppa:zhangsongcui3371/fastfetch"
        state: present
        update_cache: yes
      failed_when: false

    - name: Install fastfetch
      apt:
        name: fastfetch
        state: present
      failed_when: false

    # DNS Configuration (persistent via systemd-resolved)
    - name: Configure custom DNS servers in systemd-resolved
      lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: "^#?DNS="
        line: "DNS={{ dns_server_1 }} {{ dns_server_2 }}"
        backup: yes
      notify: Restart systemd-resolved

    - name: Disable fallback to DHCP-provided DNS
      lineinfile:
        path: /etc/systemd/resolved.conf
        regexp: "^#?FallbackDNS="
        line: "FallbackDNS="
        backup: yes
      notify: Restart systemd-resolved

    - name: Flush DNS handlers to apply new resolvers immediately
      meta: flush_handlers

    #userAddition.yml
    - name: Check if regular_user already exists
      getent:
        database: passwd
        key: "{{ regular_user }}"
      register: regular_user_check
      failed_when: false

    - name: Create regular_user with sudo privileges and set default shell to bash
      user:
        name: "{{ regular_user }}"
        shell: /bin/bash
        password: "{{ new_password | password_hash('sha512') }}"
        append: yes
        groups: sudo
        createhome: yes
      when: regular_user_check.msg is defined

    - name: Create user directories for regular_user
      file:
        path: "/home/{{ regular_user }}/{{ item }}"
        state: directory
        owner: "{{ regular_user }}"
        group: "{{ regular_user }}"
        mode: "0755"
      loop:
        - apps
        - scripts

    - name: Check if devops_user already exists
      getent:
        database: passwd
        key: "{{ devops_user }}"
      register: devops_user_check
      failed_when: false

    - name: Create devops_user with sudo privileges and set default shell to bash
      user:
        name: "{{ devops_user }}"
        shell: /bin/bash
        password: "{{ new_password | password_hash('sha512') }}"
        append: yes
        groups: sudo
        createhome: yes
      when: devops_user_check.msg is defined

    #configure_SSH_user.yml
    - name: Ensure the SSH directory exists for the devops_user
      file:
        path: "/home/{{ devops_user }}/.ssh"
        state: directory
        owner: "{{ devops_user }}"
        group: "{{ devops_user }}"
        mode: "0700"

    - name: Add SSH public key to authorized_keys
      authorized_key:
        user: "{{ devops_user }}"
        key: "{{ my_sweet_key }}"
        state: present

    - name: Ensure the SSH directory exists for the regular_user
      file:
        path: "/home/{{ regular_user }}/.ssh"
        state: directory
        owner: "{{ regular_user }}"
        group: "{{ regular_user }}"
        mode: "0700"

    - name: Add SSH public key to authorized_keys
      authorized_key:
        user: "{{ regular_user }}"
        key: "{{ my_sweet_key2 }}"
        state: present

    # Cockpit_configuration
    - name: Add TOTP authentication to PAM configuration for Cockpit
      blockinfile:
        path: /etc/pam.d/cockpit
        block: |
          auth required pam_google_authenticator.so
          auth required pam_succeed_if.so user in [{{ regular_user }}]
          auth required pam_permit.so
        marker: "# {mark} ANSIBLE MANAGED - TOTP CONFIG"
      notify: Restart Cockpit service

    - name: Flush handlers before SSH changes and reboot
      meta: flush_handlers

    #dockerInstaller.yml
    - name: Install Docker prerequisites
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
        state: present

    # Add conditional task to determine architecture and set Docker repository accordingly
    - name: Set Docker architecture
      set_fact:
        docker_arch: "{{ 'amd64' if ansible_architecture == 'x86_64' else 'arm64' }}"

    - name: Ensure /etc/apt/keyrings directory exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Re-gather facts after lsb-release install
      setup:
        gather_subset:
          - "!all"
          - "lsb"

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch={{ docker_arch }} signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present
        filename: docker

    - name: Install Docker packages
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-compose-plugin
        state: present
        update_cache: yes

    - name: Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add users to Docker group
      user:
        name: "{{ item }}"
        groups: docker
        append: yes
      loop:
        - "{{ regular_user }}"
        - "{{ devops_user }}"

    # Backup ssh config
    - name: Backup original sshd_config
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.backup
        remote_src: yes
        owner: root
        group: root
        mode: "0644"
        force: no

    #sshd_Modification.yml
    - name: Disable password authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        backup: yes
      register: sshd_password_auth

    - name: Disable root login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?PermitRootLogin"
        line: "PermitRootLogin no"
        backup: yes
      register: sshd_root_login

    - name: Disable ChallengeResponseAuthentication in sshd_config
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?ChallengeResponseAuthentication"
        line: "ChallengeResponseAuthentication no"
        backup: yes
      register: sshd_challenge_resp

    - name: Disable KbdInteractiveAuthentication in sshd_config (Ubuntu 24.04 LTS)
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "^#?KbdInteractiveAuthentication"
        line: "KbdInteractiveAuthentication no"
        backup: yes
      register: sshd_kbd_interactive

    - name: Disable password authentication in cloud-init SSH config
      lineinfile:
        path: /etc/ssh/sshd_config.d/50-cloud-init.conf
        regexp: "^#?PasswordAuthentication"
        line: "PasswordAuthentication no"
        backup: yes
      when: ansible_distribution == 'Ubuntu' and ansible_distribution_version == '24.04'
      failed_when: false
      register: sshd_cloud_init

    - name: Change SSH port to new_ssh_port
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?\s*Port\s+'
        line: "Port {{ new_ssh_port }}"
        backup: yes
      register: sshd_port_change

    - name: Check if any SSH config changed
      set_fact:
        sshd_changed: "{{ (sshd_password_auth is changed) or (sshd_root_login is changed) or (sshd_challenge_resp is changed) or (sshd_kbd_interactive is changed) or (sshd_cloud_init is changed) or (sshd_port_change is changed) }}"

    - name: Ensure SSH privilege separation directory exists
      file:
        path: /run/sshd
        state: directory
        owner: root
        group: root
        mode: "0755"

    - name: Validate SSH configuration
      command: sshd -t
      register: sshd_check
      changed_when: false
      failed_when: sshd_check.rc != 0
      when: sshd_changed | bool

    - name: Reboot the system (fire and forget)
      shell: "sleep 2 && shutdown -r now 'Ansible reboot: server setup complete'"
      async: 1
      poll: 0
      when: sshd_changed | bool and (sshd_check.rc | default(1)) == 0

    - name: End play — server is rebooting into its new configuration
      meta: end_play
      when: sshd_changed | bool

  handlers:
    - name: Restart Cockpit service
      systemd:
        name: cockpit.socket
        state: restarted

    - name: Restart systemd-resolved
      systemd:
        name: systemd-resolved
        state: restarted
